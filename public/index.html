<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Travel Finder</h1>
        <p class="subtitle">Cerca informació de països i desa les teves destinacions favorites</p>

        <div class="search-box">
            <input type="text" id="countryInput" placeholder="Introdueix un país">
            <button onclick="searchCountry()">Cercar</button>
        </div>

        <p id="loading" class="loading" style="display: none;">Carregant dades...</p>
        <p id="error" class="error"></p>

        <div id="result"></div>

        <h2>Destinacions favorites</h2>
        <ul id="favorites"></ul>
        <h3>Soc en pol villagrasa</h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
